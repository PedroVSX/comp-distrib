services:

  # ─── Banco de dados ───────────────────────────────────────────────────────────
  mysql:
    image: mysql:5.7
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: wppassword
    volumes:
      - ./volumes/mysql:/var/lib/mysql
    networks:
      - backend

  # ─── Instâncias do WordPress ──────────────────────────────────────────────────
  # Para escalar: docker compose up --scale wordpress=N -d
  wordpress:
    image: wordpress:5.4.2-php7.2-apache
    restart: always
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppassword
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - frontend
      - backend
    depends_on:
      - mysql

  # ─── Nginx (balanceador de carga) ─────────────────────────────────────────────
  nginx:
    image: nginx:1.19.0
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./volumes/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - wordpress_data:/usr/share/nginx/html:ro
    networks:
      - frontend
    depends_on:
      - wordpress

  # ─── Teste de Carga (Locust) ──────────────────────────────────────────────────
  locust:
    image: locustio/locust
    container_name: locust
    ports:
      - "8089:8089"
    volumes:
      - ./volumes/locust:/mnt/locust
    # Modo headless: roda sem UI e gera CSVs automaticamente
    # Os parâmetros USERS, SPAWN_RATE, RUN_TIME e SCENARIO são passados
    # pelo script run_tests.sh via variáveis de ambiente
    command: >
      -f /mnt/locust/locustfile.py
      --headless
      --host http://nginx
      --users ${USERS:-10}
      --spawn-rate ${SPAWN_RATE:-10}
      --run-time ${RUN_TIME:-60s}
      --csv /mnt/locust/results/${SCENARIO:-scenario1}_u${USERS:-10}
      --csv-full-history
    networks:
      - frontend
    depends_on:
      - nginx
    profiles:
      - test   # só sobe quando chamado explicitamente

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  wordpress_data:

# ─── Redes ────────────────────────────────────────────────────────────────────
networks:
  frontend:
  backend:
