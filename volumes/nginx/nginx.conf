events {
    worker_connections 1024;
}

http {
    # Resolver do Docker para descoberta dinâmica dos contêineres escalados
    resolver 127.0.0.11 valid=5s;

    upstream wordpress_cluster {
        # O Docker DNS resolve "wordpress" para TODAS as instâncias
        # quando o serviço é escalado com --scale wordpress=N
        server wordpress:80;

        # Balanceamento round-robin (padrão do Nginx)
        # Cada requisição vai para uma instância diferente em sequência
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;

        root /usr/share/nginx/html;
        index index.php;

        location / {
            # Cabeçalho útil para debug: mostra qual instância respondeu
            add_header X-Upstream $upstream_addr;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Timeouts generosos para testes de carga
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            proxy_pass http://wordpress_cluster;
        }
    }
}
